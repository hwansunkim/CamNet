server {
    listen 80;
    server_name _;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # React 정적 파일
    root /usr/share/nginx/html;
    index index.html;

    # FastAPI REST API 프록시
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # WebSocket 프록시
    location /ws {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;   # WebSocket은 타임아웃 길게
        proxy_send_timeout     3600s;
    }

    # HLS 스트림 프록시 — /hls/{ip}/{port}/{path}/... → 라즈베리파이 MediaMTX
    # SSRF 방지: cam_ip는 RFC 1918 사설 IP 대역만 허용
    #   10.x.x.x / 172.16-31.x.x / 192.168.x.x
    # cam_port는 시스템 포트(0-1023) 차단 — 4자리 이상 숫자만 허용
    location ~ ^/hls/(?<cam_ip>(?:10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|172\.(?:1[6-9]|2[0-9]|3[01])\.[0-9]{1,3}\.[0-9]{1,3}|192\.168\.[0-9]{1,3}\.[0-9]{1,3}))/(?<cam_port>[1-9][0-9]{3,4})/(?<cam_path>.*)$ {
        resolver 127.0.0.11 valid=30s;
        proxy_pass         http://$cam_ip:$cam_port/$cam_path$is_args$args;
        proxy_set_header   Host $cam_ip;
        proxy_read_timeout 30s;
        add_header         Cache-Control no-cache;
        add_header         Access-Control-Allow-Origin *;
    }

    # React SPA — 모든 경로를 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }
}
